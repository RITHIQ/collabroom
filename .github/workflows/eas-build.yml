name: EAS Build — Android APK

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci
        working-directory: mobile

      - name: 🔧 Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 🚀 Build Android APK
        run: eas build --platform android --profile ${{ github.event.inputs.profile || 'preview' }} --non-interactive
        working-directory: mobile

      - name: ✅ Build Complete
        run: echo "APK build complete! Check your Expo dashboard at https://expo.dev for the download link."
