name: 🚀 Deploy + Selenium E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-deploy-test:
    name: 🚀 Build, Deploy & Test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ─────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      # ── 3. Build React (TypeScript) app ────────────────────────────
      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Build React app
        working-directory: web
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_BASE_URL: /collabroom/
        run: npm run build

      # ── 4. Deploy to GitHub Pages ───────────────────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: web/dist
          publish_branch: gh-pages
          force_orphan: true

      # ── 5. Setup Chrome + ChromeDriver ─────────────────────────────
      - name: Install Chrome browser & ChromeDriver
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable
          install-chromedriver: true

      # ── 6. Install Selenium test dependencies ──────────────────────
      - name: Install Selenium test dependencies
        working-directory: collabroom-tests/selenium
        run: npm ci

      # ── 7. Wait for GitHub Pages to propagate ──────────────────────
      - name: Wait for GitHub Pages to go live
        run: |
          echo "Waiting 60s for GitHub Pages CDN to propagate..."
          sleep 60
          curl --retry 15 --retry-delay 5 --retry-connrefused -sSf \
            https://rithiq.github.io/collabroom/ > /dev/null \
            && echo "✅ Site is live!" \
            || echo "⚠️  Site may still be warming up, continuing anyway..."

      # ── 8. Run Selenium E2E Tests ───────────────────────────────────
      - name: Run Selenium E2E Tests
        working-directory: collabroom-tests/selenium
        env:
          CI: true
          HEADLESS: true
          BASE_URL: https://rithiq.github.io/collabroom
        run: npm test

      # ── 9. Generate Excel Report ────────────────────────────────────
      - name: Generate Excel Report
        working-directory: collabroom-tests/selenium
        if: always()
        run: node generate-excel.js

      # ── 10. Upload Artifacts ────────────────────────────────────────
      - name: Upload E2E Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: selenium-e2e-report
          path: |
            collabroom-tests/selenium/jest-results.json
            collabroom-tests/selenium/reports/E2E_Test_Report.xlsx
          retention-days: 30
